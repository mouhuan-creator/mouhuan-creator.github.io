<p>注：<code>Now Page</code>概念源自<a href="https://sive.rs" style="color:#8B4513;text-decoration:none;border-bottom:2px solid #FFD700" target="_blank" rel="noopener noreferrer">Derek Sivers</a>发起的<a href="https://nownownow.com/about" style="color:#8B4513;text-decoration:none;border-bottom:2px solid #FFD700" target="_blank" rel="noopener noreferrer">nownownow.com</a>项目，你也可以在自己的网站中添加一个<code>/now</code>页面，加入这项倡议。本站目前未加入该企划中，仅试运行。</p>

<div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(230,230,250,0.92);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9999;align-items:center;justify-content:center">
  <img id="lightbox-img" style="max-width:95%;max-height:95%;border-radius:8px;object-fit:contain;display:block;margin:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)" />
  <button id="lightbox-prev" style="position:absolute;left:20px;top:50%;transform:translateY(-50%);background:rgba(61,43,31,0.12);border:none;color:#3D2B1F;font-size:2.5em;padding:0.1em 0.4em;border-radius:50%;cursor:pointer;display:none;backdrop-filter:blur(4px);transition:background 0.2s">‹</button>
  <button id="lightbox-next" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(61,43,31,0.12);border:none;color:#3D2B1F;font-size:2.5em;padding:0.1em 0.4em;border-radius:50%;cursor:pointer;display:none;backdrop-filter:blur(4px);transition:background 0.2s">›</button>
  <button id="lightbox-close" style="position:absolute;top:20px;right:25px;background:none;border:none;color:#3D2B1F;font-size:2.5em;cursor:pointer;opacity:0.5">&times;</button>
</div>
  <script>
let lightboxImages = [];
let currentIndex = 0;
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbPrev = document.getElementById('lightbox-prev');
const lbNext = document.getElementById('lightbox-next');
const lbClose = document.getElementById('lightbox-close');

function openLightbox(index) {
  currentIndex = index;
  lbImg.src = lightboxImages[currentIndex];
  lb.style.display = 'flex';
  lbPrev.style.display = lightboxImages.length > 1 ? 'block' : 'none';
  lbNext.style.display = lightboxImages.length > 1 ? 'block' : 'none';
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target && e.target !== e.currentTarget && e.target !== lbClose) return;
  lb.style.display = 'none';
  document.body.style.overflow = '';
}

function prevImage(e) {
  e.stopPropagation();
  if (lightboxImages.length <= 1) return;
  currentIndex = (currentIndex - 1 + lightboxImages.length) % lightboxImages.length;
  lbImg.src = lightboxImages[currentIndex];
}

function nextImage(e) {
  e.stopPropagation();
  if (lightboxImages.length <= 1) return;
  currentIndex = (currentIndex + 1) % lightboxImages.length;
  lbImg.src = lightboxImages[currentIndex];
}

lbPrev.onclick = prevImage;
lbNext.onclick = nextImage;
lbClose.onclick = closeLightbox;
lb.onclick = closeLightbox;

document.addEventListener('keydown', function(e) {
  if (lb.style.display === 'flex') {
    if (e.key === 'Escape') { lb.style.display = 'none'; document.body.style.overflow = ''; }
    if (e.key === 'ArrowLeft' && lightboxImages.length > 1) { e.preventDefault(); prevImage(e); }
    if (e.key === 'ArrowRight' && lightboxImages.length > 1) { e.preventDefault(); nextImage(e); }
  }
});

document.addEventListener('DOMContentLoaded', function() {
  const imgs = document.querySelectorAll('.lightbox-img');
  lightboxImages = Array.from(imgs).map(img => img.src);
  imgs.forEach((img, idx) => { img.onclick = function() { openLightbox(idx); }; });
});

function toggleToc(){const p=document.getElementById('toc-panel'),b=document.getElementById('toc-btn');if(p.classList.contains('open')){closeToc()}else{p.classList.add('open');b.style.transform='rotate(90deg)'}}
function closeToc(){const p=document.getElementById('toc-panel'),b=document.getElementById('toc-btn');p.classList.remove('open');b.style.transform='rotate(0deg)'}
document.addEventListener('click',e=>{if(!e.target.closest('.toc-container'))closeToc()});

const backTop=document.getElementById('back-top');
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'})}
window.addEventListener('scroll',()=>{backTop.classList.toggle('show',window.scrollY>500)});
document.addEventListener('keydown',e=>{if(e.key==='t'&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&!e.shiftKey){e.preventDefault();scrollToTop()}});

window.addEventListener('scroll',()=>{
  const links=document.querySelectorAll('.toc-panel a');
  if(!links.length)return;
  const headers=document.querySelectorAll('h2, h3');
  let current='';
  for(const h of headers){
    if(h.getBoundingClientRect().top >= 0){
      current=h.id;
      break;
    }
  }
  links.forEach(a=>{a.classList.toggle('active',a.dataset.target===current)});
});

function copyCode(id){const code=document.getElementById(id).innerText;navigator.clipboard.writeText(code).then(()=>{const btn=event.target;const orig=btn.textContent;btn.textContent='已复制!';btn.style.background='rgba(139,69,19,0.1)';setTimeout(()=>{btn.textContent=orig;btn.style.background='rgba(255,255,255,0.9)'},2000)})}
</script>
