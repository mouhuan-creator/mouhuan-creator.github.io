<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">
  <title>404 · 此路不通</title>
  <style>
    *{box-sizing:border-box;margin:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#E6E6FA;color:#3D2B1F;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 1.5rem}
    .container{width:100%;max-width:680px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    h1{font-size:4em;font-weight:300;color:#6B5B4F;margin:0 0 0.1em 0;letter-spacing:2px;line-height:1.2}
    .code{font-size:1.2em;color:#8B4513;letter-spacing:4px;margin-bottom:0.6em}
    .msg{font-size:1.1em;color:#6B5B4F;margin-bottom:1.8em}
    .hint-link{font-size:1em;color:#6B5B4F;margin-top:0.2em}
    .hint-link a{color:#8B4513;text-decoration:none;border-bottom:2px solid #8B4513;padding-bottom:0.1em;transition:opacity 0.15s}
    .hint-link a:hover{opacity:0.7}
    .footer-note{font-size:0.75em;color:#6B5B4F;opacity:0.4;margin-top:2.5em;letter-spacing:0.3px}
    @media(max-width:480px){h1{font-size:3.2em}.code{font-size:1.1em}.msg{font-size:1em}body{padding:0 1.2rem}}
    @media(min-width:768px){h1{font-size:4.8em}}
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <div class="code">¯\_(ツ)_/¯</div>
    <p class="msg">你找的页面不在这里<br>可能在另一个平行宇宙</p>
    <div class="hint-link">
      <a href="/">← 回首页看看？</a>
    </div>
    <div class="footer-note">没有数据被记录 · 没有追踪 · 只有沉默</div>
  </div>
</body>
</html>
